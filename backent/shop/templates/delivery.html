<script>
// Тақсимоти пинҳонӣ ба минтақаҳо барои ҳисоб кардани масофа
const regions = {
    // Хатлон (Кӯлоб, Бохтар ва ноҳияҳо)

    'vakhsh': 'khatlon', 'dusti': 'khatlon', 'kushoniyon': 'khatlon', 'baljuvon': 'khatlon',
    'muminobod': 'khatlon', 'panj': 'khatlon', 'farkhor': 'khatlon', 'khovaling': 'khatlon',
    'sh_shohin': 'khatlon', 'jayhun': 'khatlon', 'j_balkhi': 'khatlon', 'jomi': 'khatlon',
    'bahoriyon': 'khatlon', 'nosiri_khusrav': 'khatlon',
    
    // Суғд (Хуҷанд ва ноҳияҳо)
    'khujand': 'sughd', 'istravshan': 'sughd', 'isfara': 'sughd', 'konibodom': 'sughd',
    'panjakent': 'sughd', 'guliston': 'sughd', 'buston': 'sughd', 'istiqlol': 'sughd',
    'ayni': 'sughd', 'asht': 'sughd', 'b_gafurov': 'sughd', 'devashtich': 'sughd',
    'zafarobod': 'sughd', 'k_mastchoh': 'sughd', 'mastchoh': 'sughd', 'spitamen': 'sughd',
    'j_rasulov': 'sughd',

    // Душанбе ва НТМ
    'dushanbe': 'ntm', 'vahdat': 'ntm', 'hissar': 'ntm', 'tursunzoda': 'ntm',
    'rogun': 'ntm', 'rudaki': 'ntm', 'varzob': 'ntm', 'shahrinav': 'ntm',
    'fayzobod': 'ntm', 'lakhsh': 'ntm', 'rasht': 'ntm', 'tojikobod': 'ntm',
    'nurobod': 'ntm', 'sangvor': 'ntm',

    // ВМКБ (Хоруғ ва ноҳияҳо)
    'khorog': 'gbao', 'darvoz': 'gbao', 'vanj': 'gbao', 'rushon': 'gbao',
    'shugnon': 'gbao', 'roshtqala': 'gbao', 'ishkoshim': 'gbao', 'murgob': 'gbao'
};

// Рӯйхати шаҳрҳои асосӣ барои муайян кардани тарифи "шаҳр ба шаҳр"
const mainCities = ['dushanbe', 'khujand', 'bokhtar', 'kulob', 'khorog', 'istravshan', 'isfara', 'konibodom', 'panjakent', 'tursunzoda', 'vahdat'];

function calculateDelivery() {
    const fromCity = document.getElementById('from_city').value;
    const toCity = document.getElementById('to_city').value;
    
    const priceElement = document.getElementById('delivery_price');
    const timeElement = document.getElementById('delivery_time');

    // 1. Даруни як шаҳр ё ноҳия (15 сомонӣ)
    if (fromCity === toCity) {
        priceElement.innerText = "15 сомонӣ";
        timeElement.innerText = "🕒 Вақт: 1-3 соат (Дар дохили як ҷой)";
        return;
    }

    const fromRegion = regions[fromCity];
    const toRegion = regions[toCity];

    let price = 25;
    let time = "5-8 соат";

    // 2. Мантиқи ҳисобкунии нархҳо
    if (fromRegion === toRegion) {
        // Дар дохили як вилоят ё минтақа (Масалан Кӯлоб ба Темурмалик ё Данғара)
        // Санҷиши наздикӣ: Агар ягонтоаш ноҳияҳои дурдаст ба мисли Лахш ё Мурғоб бошанд
        if (fromCity === 'murgob' || toCity === 'murgob' || fromCity === 'lakhsh' || toCity === 'lakhsh') {
            price = 30; // Ноҳияи дур
            time = "1 рӯз";
        } else {
            price = 20; // Қариб / Ноҳияи наздик
            time = "2-4 соат";
        }
    } else {
        // Байни минтақаҳои гуногун (Дур)
        const isFromMainCity = mainCities.includes(fromCity);
        const isToMainCity = mainCities.includes(toCity);

        if (isFromMainCity && isToMainCity) {
            // Аз як шаҳри асосӣ ба шаҳри асосии дигар (Масалан: Душанбе ба Хуҷанд ё Кӯлоб ба Бохтар)
            if ((fromRegion === 'sughd' && toRegion === 'khatlon') || (fromRegion === 'khatlon' && toRegion === 'sughd') || fromRegion === 'gbao' || toRegion === 'gbao') {
                price = 40; // Шаҳрҳои хеле дур (Суғд-Хатлон, ё Ба Помир)
                time = "1 рӯз";
            } else {
                price = 35; // Шаҳрҳои дур (Масалан Душанбе-Кӯлоб ё Душанбе-Хуҷанд)
                time = "5-7 соат";
            }
        } else {
            // Аз ноҳия ба ноҳияи вилояти дигар (Масалан Темурмалик ба Исфара - Дур)
            price = 30;
            time = "1 рӯз";
        }
    }

    // Намоиши натиҷа
    priceElement.innerText = price + " сомонӣ";
    timeElement.innerText = "🕒 Вақт: " + time;
}

document.addEventListener("DOMContentLoaded", function() {
    calculateDelivery();
});
</script>
